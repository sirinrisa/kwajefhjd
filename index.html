<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Flashcards">
    <title>Flashcards - Учебные карточки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: white;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
            font-size: 2em;
            font-weight: 500;
        }

        .card-wrapper {
            margin-bottom: 40px;
            perspective: 1000px;
        }

        .card {
            width: 100%;
            height: 500px;
            cursor: pointer;
            position: relative;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background: white;
            border: 1px solid #e0e0e0;
        }

        .card-front {
            background: white;
        }

        .card-back {
            background: #fafafa;
            transform: rotateY(180deg);
        }

        .card-front h3, .card-back h3 {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.2em;
            font-weight: 500;
        }

        .card-front p {
            font-size: 1.5em;
            color: #333;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-width: 100%;
            overflow-y: auto;
            max-height: 70%;
        }

        .card-back p {
            font-size: 1.1em;
            color: #333;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-width: 100%;
            overflow-y: auto;
            max-height: 70%;
        }

        .flip-hint {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: #999;
            font-size: 0.85em;
            pointer-events: none;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            background: white;
            border: 1px solid #ddd;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            color: #555;
        }

        .btn-primary {
            background: #333;
            border-color: #333;
            color: white;
        }

        .btn-success {
            background: #28a745;
            border-color: #28a745;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            border-color: #dc3545;
            color: white;
        }

        .counter {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }

        .stats {
            text-align: center;
            margin-bottom: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            border: 1px solid #e0e0e0;
        }

        .stat-item {
            display: flex;
            gap: 8px;
            align-items: baseline;
        }

        .stat-label {
            color: #666;
            font-weight: 500;
        }

        .stat-value {
            color: #333;
            font-weight: 600;
            font-size: 1.1em;
        }

        .add-card-form {
            background: #fafafa;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #e0e0e0;
            margin-top: 40px;
        }

        .add-card-form h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.3em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button[type="submit"] {
            background: #333;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            background: #fafafa;
            border-radius: 20px;
            border: 1px solid #e0e0e0;
        }

        .progress {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 0.85em;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Флэш-карточки</h1>
        
        <div id="cardsContainer">
            <div class="empty-state">
                <p>Загрузка карточек...</p>
            </div>
        </div>
        
        <div class="add-card-form">
            <h2>Добавить новую карточку</h2>
            <form id="addCardForm">
                <div class="form-group">
                    <label for="question">Вопрос:</label>
                    <input type="text" id="question" required placeholder="Введите вопрос...">
                </div>
                <div class="form-group">
                    <label for="answer">Ответ:</label>
                    <textarea id="answer" required placeholder="Введите ответ..."></textarea>
                </div>
                <button type="submit">Добавить карточку</button>
            </form>
        </div>
    </div>

    <script>
        let allCards = [];
        let currentQueue = [];
        let unknownCards = [];
        let currentCardIndex = 0;
        let nextId = 1;
        
        const SESSION_KEY = 'flashcards_session';
        const CARDS_KEY = 'flashcards_data';

        function saveSession() {
            const sessionData = {
                unknownCardsIds: unknownCards.map(c => c.id),
                currentQueueIds: currentQueue.map(c => c.id),
                currentCardIndex: currentCardIndex
            };
            localStorage.setItem(SESSION_KEY, JSON.stringify(sessionData));
        }

        function loadSession() {
            const savedSession = localStorage.getItem(SESSION_KEY);
            if (savedSession) {
                try {
                    const sessionData = JSON.parse(savedSession);
                    if (sessionData.unknownCardsIds && sessionData.unknownCardsIds.length > 0) {
                        unknownCards = allCards.filter(card => sessionData.unknownCardsIds.includes(card.id));
                    } else {
                        unknownCards = [];
                    }
                    if (sessionData.currentQueueIds && sessionData.currentQueueIds.length > 0) {
                        currentQueue = allCards.filter(card => sessionData.currentQueueIds.includes(card.id));
                        currentCardIndex = sessionData.currentCardIndex || 0;
                        if (currentCardIndex >= currentQueue.length) {
                            currentCardIndex = 0;
                        }
                    } else {
                        currentQueue = [...allCards];
                        shuffleArray(currentQueue);
                        currentCardIndex = 0;
                    }
                    return true;
                } catch (e) {
                    return false;
                }
            }
            return false;
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        async function loadCardsFromJSON() {
            try {
                const response = await fetch('questions.json');
                if (response.ok) {
                    const data = await response.json();
                    if (data.cards && Array.isArray(data.cards)) {
                        allCards = data.cards;
                        nextId = Math.max(...allCards.map(c => c.id), 0) + 1;
                        saveCardsToLocal();
                        showNotification('Карточки загружены из questions.json');
                        return true;
                    }
                }
            } catch (error) {
                console.log('Файл questions.json не найден');
            }
            return false;
        }

        function saveCardsToLocal() {
            localStorage.setItem(CARDS_KEY, JSON.stringify(allCards));
        }

        function loadCardsFromLocal() {
            const saved = localStorage.getItem(CARDS_KEY);
            if (saved) {
                allCards = JSON.parse(saved);
                nextId = Math.max(...allCards.map(c => c.id), 0) + 1;
                return true;
            }
            return false;
        }

        function setDefaultCards() {
            allCards = [
                { id: 1, question: "Что такое Python?", answer: "Python - это высокоуровневый язык программирования" },
                { id: 2, question: "Что такое SQL?", answer: "SQL - язык структурированных запросов" },
                { id: 3, question: "Что такое HTML?", answer: "HTML - язык гипертекстовой разметки" },
                { id: 4, question: "Что такое CSS?", answer: "CSS - каскадные таблицы стилей" },
                { id: 5, question: "Что такое JavaScript?", answer: "JavaScript - язык программирования для веб-страниц" },
                { id: 6, question: "Что такое React?", answer: "React - библиотека для создания интерфейсов" },
                { id: 7, question: "Что такое Node.js?", answer: "Node.js - среда выполнения JavaScript на сервере" },
                { id: 8, question: "Что такое Git?", answer: "Git - система контроля версий" },
                { id: 9, question: "Что такое Docker?", answer: "Docker - платформа для контейнеризации" },
                { id: 10, question: "Что такое Flask?", answer: "Flask - микрофреймворк для Python" }
            ];
            nextId = 11;
            saveCardsToLocal();
        }

        async function initCards() {
            const loadedFromJSON = await loadCardsFromJSON();
            
            if (!loadedFromJSON) {
                const loadedFromLocal = loadCardsFromLocal();
                if (!loadedFromLocal) {
                    setDefaultCards();
                }
            }
            
            const sessionLoaded = loadSession();
            
            if (!sessionLoaded || currentQueue.length === 0) {
                startNewRound();
            } else {
                renderCurrentCard();
            }
        }

        function startNewRound() {
            currentQueue = [...allCards];
            shuffleArray(currentQueue);
            currentCardIndex = 0;
            unknownCards = [];
            saveSession();
            renderCurrentCard();
        }

        function continueWithUnknown() {
            if (unknownCards.length === 0) {
                showNotification('Поздравляем! Вы выучили все карточки!');
                renderComplete();
                return;
            }
            
            currentQueue = [...unknownCards];
            shuffleArray(currentQueue);
            currentCardIndex = 0;
            unknownCards = [];
            saveSession();
            renderCurrentCard();
            showNotification(`Повторяем ${currentQueue.length} карточек, которые вы не знали`);
        }

        function markAsKnown() {
            if (currentQueue.length === 0) return;
            
            currentQueue.splice(currentCardIndex, 1);
            saveSession();
            
            if (currentQueue.length > 0) {
                if (currentCardIndex >= currentQueue.length) {
                    currentCardIndex = 0;
                }
                renderCurrentCard();
                showNotification('Знаю! Карточка удалена из очереди');
            } else {
                if (unknownCards.length > 0) {
                    showNotification('Круг завершен! Переходим к повторению невыученных карточек');
                    continueWithUnknown();
                } else {
                    showNotification('Поздравляем! Вы выучили все карточки!');
                    renderComplete();
                }
            }
        }

        function markAsUnknown() {
            if (currentQueue.length === 0) return;
            
            const currentCard = currentQueue[currentCardIndex];
            
            const isAlreadyInUnknown = unknownCards.some(card => card.id === currentCard.id);
            if (!isAlreadyInUnknown) {
                unknownCards.push(currentCard);
            }
            
            currentQueue.splice(currentCardIndex, 1);
            saveSession();
            
            if (currentQueue.length > 0) {
                if (currentCardIndex >= currentQueue.length) {
                    currentCardIndex = 0;
                }
                renderCurrentCard();
                showNotification('Не знаю! Карточка отложена для повторения');
            } else {
                if (unknownCards.length > 0) {
                    showNotification('Круг завершен! Переходим к повторению невыученных карточек');
                    continueWithUnknown();
                } else {
                    showNotification('Поздравляем! Вы выучили все карточки!');
                    renderComplete();
                }
            }
        }

        function renderCurrentCard() {
            const container = document.getElementById('cardsContainer');
            
            if (allCards.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>Нет карточек</p>
                        <p style="font-size: 0.9em;">Добавьте свою первую карточку ниже</p>
                    </div>
                `;
                return;
            }
            
            if (currentQueue.length === 0) {
                if (unknownCards.length === 0) {
                    renderComplete();
                } else {
                    continueWithUnknown();
                }
                return;
            }
            
            const card = currentQueue[currentCardIndex];
            const totalLearned = allCards.length - unknownCards.length - (currentQueue.length - 1);
            
            container.innerHTML = `
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-label">Всего:</span>
                        <span class="stat-value">${allCards.length}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Выучено:</span>
                        <span class="stat-value">${totalLearned}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">В круге:</span>
                        <span class="stat-value">${currentQueue.length}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">На повторении:</span>
                        <span class="stat-value">${unknownCards.length}</span>
                    </div>
                </div>
                <div class="counter">
                    Карточка ${currentCardIndex + 1} из ${currentQueue.length}
                </div>
                <div class="card-wrapper">
                    <div class="card" onclick="toggleCard(this)">
                        <div class="card-inner">
                            <div class="card-front">
                                <h3>Вопрос</h3>
                                <p>${escapeHtml(card.question)}</p>
                                <div class="flip-hint">нажмите для ответа</div>
                            </div>
                            <div class="card-back">
                                <h3>Ответ</h3>
                                <p>${escapeHtml(card.answer)}</p>
                                <div class="flip-hint">нажмите для вопроса</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="controls">
                    <button class="btn btn-success" onclick="markAsKnown()">Знаю</button>
                    <button class="btn btn-danger" onclick="markAsUnknown()">Не знаю</button>
                </div>
                <div class="controls">
                    <button class="btn" onclick="shuffleCurrentQueue()">Перемешать</button>
                    <button class="btn btn-primary" onclick="startNewRound()">Начать заново</button>
                </div>
                <div class="progress">
                    Кликните по карточке, чтобы перевернуть
                    Знаю - карточка уходит из текущего круга
                    Не знаю - карточка откладывается для повторения
                </div>
            `;
        }

        function renderComplete() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = `
                <div class="empty-state">
                    <p>Поздравляю!</p>
                    <p style="font-size: 1.2em; margin-top: 10px;">Вы выучили все ${allCards.length} карточек!</p>
                    <div class="controls" style="margin-top: 30px;">
                        <button class="btn btn-primary" onclick="startNewRound()">Начать заново</button>
                    </div>
                </div>
            `;
        }

        function shuffleCurrentQueue() {
            for (let i = currentQueue.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentQueue[i], currentQueue[j]] = [currentQueue[j], currentQueue[i]];
            }
            currentCardIndex = 0;
            saveSession();
            renderCurrentCard();
            showNotification('Карточки перемешаны');
        }

        function toggleCard(cardElement) {
            cardElement.classList.toggle('flipped');
        }

        document.getElementById('addCardForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const question = document.getElementById('question').value;
            const answer = document.getElementById('answer').value;
            
            const newCard = {
                id: nextId++,
                question: question,
                answer: answer
            };
            
            allCards.push(newCard);
            saveCardsToLocal();
            
            document.getElementById('question').value = '';
            document.getElementById('answer').value = '';
            
            startNewRound();
            showNotification('Карточка добавлена');
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.remove();
            }, 2000);
        }

        initCards();
    </script>
</body>
</html>
